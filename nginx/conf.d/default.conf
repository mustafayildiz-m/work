server {
    listen 80;
    server_name islamicwindows.com www.islamicwindows.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://islamicwindows.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.islamicwindows.com;
    ssl_certificate /etc/letsencrypt/live/islamicwindows.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/islamicwindows.com/privkey.pem;
    return 301 https://islamicwindows.com$request_uri;
}

server {
    listen 443 ssl;
    server_name islamicwindows.com;
    ssl_certificate /etc/letsencrypt/live/islamicwindows.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/islamicwindows.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- AUTH REDIRECTS DURING MAINTENANCE ---
    location /api/auth/ {
        return 302 /;
    }

    # --- MAINTENANCE MOD (SUSPENDED) ---
    root /etc/nginx/conf.d;
    index index.html;

    # Serve the GIF itself
    location = /work.gif {
        root /etc/nginx/conf.d;
    }

    # Redirect Admin to Index
    location /admin/ {
        return 302 /;
    }

    # Redirect API to Index (Optional, keeps it clean)
    location /api/ {
        return 302 /;
    }

    # Main redirect
    location / {
        try_files $uri $uri/ /index.html;
    }
}
